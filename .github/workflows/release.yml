name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup NDK 26
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build libbox
        run: |
          mkdir -p app/libs
          git clone --depth=1 --branch v1.13.14 https://github.com/SagerNet/sing-box.git ../sing-box
          cd ../sing-box
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.13
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.13
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile bind -v -o libbox.aar -target android -androidapi 21 -javapkg=io.nekohasekai -libname=box ./experimental/libbox
          cp libbox.aar ${GITHUB_WORKSPACE}/app/libs/

      - name: Build
        run: ./gradlew assembleOtherRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/other/release/*.apk
