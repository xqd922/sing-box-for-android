name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_VERSION: "1.13.14"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Extract libbox.aar from upstream APK
        run: |
          mkdir -p app/libs /tmp/libbox-extract /tmp/libbox-aar/jni

          # Download upstream universal APK
          gh release download "v${UPSTREAM_VERSION}" -R SagerNet/sing-box \
            -p "SFA-${UPSTREAM_VERSION}-universal.apk" --skip-existing

          # Extract APK (it's a zip)
          cd /tmp/libbox-extract
          unzip -o "${GITHUB_WORKSPACE}/SFA-${UPSTREAM_VERSION}-universal.apk"

          # Copy classes.jar (contains libbox Java bindings)
          cp classes.jar /tmp/libbox-aar/classes.jar

          # Copy native .so libraries
          cp -r lib/* /tmp/libbox-aar/jni/ 2>/dev/null || true
          cp -r jni/* /tmp/libbox-aar/jni/ 2>/dev/null || true

          # Create AndroidManifest.xml
          cat > /tmp/libbox-aar/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="io.nekohasekai.libbox">
          </manifest>
          EOF

          # Package as AAR
          cd /tmp/libbox-aar
          zip -r ${GITHUB_WORKSPACE}/app/libs/libbox.aar .

      - name: Build
        run: ./gradlew assembleOtherRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/other/release/*.apk
