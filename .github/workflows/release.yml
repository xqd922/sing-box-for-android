name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup NDK 28
        run: |
          sdkmanager "ndk;28.0.13004108"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Build libbox
        run: |
          git clone --depth=1 --branch v1.12.13 https://github.com/SagerNet/sing-box.git
          cd sing-box
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.8
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.8
          export PATH=$PATH:$(go env GOPATH)/bin
          go run ./cmd/internal/build_libbox -target android

      - uses: actions/upload-artifact@v4
        with:
          name: libbox
          path: sing-box/libbox.aar

  build:
    needs: build-libbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup signing
        run: |
          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}" > local.properties
          echo "ALIAS_NAME=${{ secrets.ALIAS_NAME }}" >> local.properties
          echo "ALIAS_PASS=${{ secrets.ALIAS_PASS }}" >> local.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - uses: actions/download-artifact@v4
        with:
          name: libbox
          path: app/libs

      - name: Build
        run: ./gradlew assembleOtherRelease

      - name: Extract release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG_NAME" '
            $0 == "## " tag { found=1 }
            found {
              if ($0 ~ /^## / && $0 != "## " tag) exit
              print
            }
            END {
              if (!found) {
                print "Missing changelog section for " tag > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: app/build/outputs/apk/other/release/*.apk
