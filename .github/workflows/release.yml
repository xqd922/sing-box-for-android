name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build libbox
        run: |
          mkdir -p app/libs
          git clone --depth=1 https://github.com/SagerNet/sing-box.git ../sing-box
          cd ../sing-box
          make lib_install
          ANDROID_HOME=$ANDROID_HOME make lib_android
          cp libbox.aar ${GITHUB_WORKSPACE}/app/libs/

      - name: Build
        run: ./gradlew assembleOtherRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/other/release/*.apk
